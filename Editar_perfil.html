<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Perfil</title>

<link rel="stylesheet" href="Editar_Perfil.css">

</head>

<body>

<h1>Editar perfil</h1>
<hr>

<div class="perfil-container">

<div class="foto-area">
<div class="foto">👤</div>

<div class="menu-foto">
<p>Adicionar foto</p>
<p>Visualizar foto</p>
</div>
</div>

<form class="form-perfil">

<label>Nome</label> <input type="text" placeholder="Seu nome">

<label>E-mail</label> <input type="email" placeholder="seu@email.com">

<label>Nome de usuário</label> <input type="text" placeholder="usuario123">

<label>Telefone</label> <input type="text" placeholder="+55">

<label>Sexo</label> <select>

<option>Masculino</option>
<option>Feminino</option>
<option>Outro</option>
</select>

<label>Biografia</label>

<textarea rows="4" placeholder="Escreva algo sobre você"></textarea>

<button type="submit">Salvar</button>

</form>

</div>

</body>
</html>
