<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    background: #F0F0F2;
}

/* MENU */
.sidebar {
    width: 250px;
    height: 100vh;
    background: #8C031C;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    color: #D9B607;
    margin-bottom: 20px;
}

.menu li {
    list-style: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.menu li:hover {
    background: #BF6980;
}

.submenu {
    margin-left: 15px;
    font-size: 14px;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* PERÍODO */
.periodo {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.periodo button {
    padding: 8px 15px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: #F0F0F2;
    cursor: pointer;
}

.periodo .ativo {
    background: #8C031C;
    color: white;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 12px;
    border-left: 6px solid #8C5C03;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card h3 {
    color: #8C031C;
}

/* BUSCA */
.top-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.top-bar input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn-ajuda {
    background: #F0F0F2;
    border: 1px solid #ccc;
    border-radius: 8px;
}

/* FILTROS */
.filtros {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.filtros button {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
}

.filtros button:hover {
    background: #BF6980;
    color: white;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #BF6980;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

/* BOTÕES */
button {
    cursor: pointer;
    border: none;
}

.btn-aprovar {
    background: #D9B607;
    padding: 5px 10px;
    border-radius: 6px;
}

.btn-recusar {
    background: #8C031C;
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
}

.btn-detalhes {
    background: #8C5C03;
    color: white;
    padding: 5px 10px;
    border-radius: 6px;
}

/* GRÁFICOS */
.graficos {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.grafico-box {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
    <h2>Painel</h2>
    <ul class="menu">
        <li><strong>Vendedores ▼</strong></li>
        <li class="submenu" type="button" onclick="window.location.href='TelaInícioAdmin.html'" >Perfis</li>
        <li class="submenu active" >Atividade</li>
        <li class="submenu" type="button" onclick="window.location.href='AlertaAdmin.html'">Alertas/Notificações</li>

        <li><strong>Clientes ▼</strong></li>
        <li class="submenu" type="button" onclick="window.location.href='AdmGeral.html'" >Adm Geral</li>
        <li class="submenu" type="button" onclick="window.location.href='Marketing.html'" >Marketing</li>
        <li class="submenu" type="button" onclick="window.location.href='Suporte.html'">Suporte</li>
    </ul>
</div>

<!-- CONTEÚDO -->
<div class="main">

    <!-- PERÍODO -->
    <div class="periodo">
        <button class="ativo">Hoje</button>
        <button>Esta semana</button>
        <button>Este mês</button>
        <button>Este ano</button>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card"><h3>Receita bruta</h3><p>R$ 73.800</p></div>
        <div class="card"><h3>Vendedores ativos</h3><p>1.284</p></div>
        <div class="card"><h3>Pedidos</h3><p>312</p></div>
        <div class="card"><h3>Pendentes</h3><p>47</p></div>
    </div>

  


    <!-- GRÁFICOS -->
    <div class="graficos">
        <div class="grafico-box">
            <h3>Receita</h3>
            <canvas id="graficoBarra"></canvas>
        </div>

        <div class="grafico-box">
            <h3>Categorias</h3>
            <canvas id="graficoPizza"></canvas>
        </div>
    </div>

</div>

<script>
new Chart(document.getElementById('graficoBarra'), {
    type: 'bar',
    data: {
        labels: ['8h','9h','10h','11h','12h','13h'],
        datasets: [{
            label: 'Receita',
            data: [3000,4000,5000,4500,6000,5500],
            backgroundColor: '#8C031C'
        }]
    }
});

new Chart(document.getElementById('graficoPizza'), {
    type: 'doughnut',
    data: {
        labels: ['Ficção','Infantil','Acadêmico'],
        datasets: [{
            data: [35,25,40],
            backgroundColor: ['#8C031C','#D9B607','#BF6980']
        }]
    }
});
</script>

</body>
</html>
