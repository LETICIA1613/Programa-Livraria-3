<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria</title>
    <link href="login.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<h1 class="titulo">Faça Login ou Cadastre-se:</h1>

<div class="card">
    <div class="card-topo">
        <h2>Livraria</h2>
        <div class="bolinhas">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <form class="form">

        <label>E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">

        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">

        <a class="link" href="esqueci_minha_senha.html">Esqueci minha senha</a>

        <button type="button" class="btn-entrar" onclick="window.location.href='Entrar.html'">
            Entrar
        </button>

        <div class="lembrar">
            <input type="checkbox" id="lembrar">
            <label for="lembrar">Lembrar-me</label>
        </div>

        <!-- Google -->
        <div id="g_id_onload"
            data-client_id="SEU_CLIENT_ID_AQUI"
            data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="outline">
        </div>

        <button type="button" class="btn-cadastro"
        onclick="window.location.href='Cadastro1.html'">
            Cadastre-se
        </button>

        <a class="link" href="Cadastro1.html">
            Não tem uma conta? Cadastre-se
        </a>

    </form>
</div>

<script>
function handleCredentialResponse(response) {
    console.log("Token JWT:", response.credential);
    alert("Login realizado com sucesso!");
}
</script>

</body>
</html>
