<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Atendimento ao Cliente</title>
    <link rel="stylesheet" href="Chat.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Suporte ao Cliente</h2>
            <p>Estamos online! Como podemos ajudar?</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Olá! 😊 Bem-vindo(a) ao nosso chat de atendimento. 
                    <br><br>
                    Como posso ajudar você hoje?
                    <div class="message-time">14:30</div>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="chat-input">
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        let messages = [
            "Olá! Como posso ajudar?",
            "Seu pedido já foi enviado e está a caminho!",
            "Pode me enviar o número do seu pedido?",
            "Obrigado por entrar em contato!",
            "Estamos analisando sua solicitação.",
            "Tudo certo por aqui?"
        ];
    </script>

</body>
</html>
