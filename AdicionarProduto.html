<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="AdicionarProduto.css">
</head>
<body>

<div class="container">

    <form class="formulario">
        <h2>Adicionar Produto</h2>

        <fieldset>
            <legend>Qual o tipo de produto?</legend>

            <label class="opcao">
                <input type="radio" name="tipo" value="livro">
                <span>📚 Livro</span>
            </label>

            <label class="opcao">
                <input type="radio" name="tipo" value="papelaria">
                <span>✏️ Produto de Papelaria</span>
            </label>

        </fieldset>

        <button type="submit" class="btn">Próximo</button>
    </form>

</div>

</body>
</html>
