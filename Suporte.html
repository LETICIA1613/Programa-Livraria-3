<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte & Configurações</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#F0F0F2;}

/* SIDEBAR */
.sidebar{width:250px;height:100vh;background:#8C031C;color:white;padding:20px;}
.sidebar h2{color:#D9B607;margin-bottom:20px;}
.menu li{list-style:none;padding:10px;border-radius:8px;cursor:pointer;}
.menu li:hover{background:#BF6980;}
.submenu{margin-left:15px;font-size:14px;}

/* MAIN */
.main{flex:1;padding:30px;}

.header{font-size:24px;font-weight:600;color:#8C031C;margin-bottom:20px;}

.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tabs button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#F0F0F2;
    cursor:pointer;
}
.tabs .active{
    background:#8C031C;
    color:white;
}

.container{display:flex;gap:20px;margin-bottom:20px;}
.box{
    flex:1;
    background:white;
    padding:20px;
    border-radius:12px;
    border-left:6px solid #8C5C03;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.box h3{color:#8C031C;margin-bottom:15px;}

select, input[type="checkbox"]{
    margin-top:8px;
}

select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

.checkbox-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.btn-salvar{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#D9B607;
    cursor:pointer;
    font-weight:600;
}

.btn-salvar:hover{
    background:#8C5C03;
    color:white;
}

</style>
</head>
<body>

<!-- MENU -->
<div class="sidebar">
<h2>Painel</h2>
<ul class="menu">
        <li><strong>Vendedores ▼</strong></li>
        <li class="submenu" type="button" onclick="window.location.href='TelaInícioAdmin.html'" >Perfis</li>
        <li class="submenu" type="button" onclick="window.location.href='RelatórioAdmin.html'" >Atividade</li>
        <li class="submenu" type="button" onclick="window.location.href='AlertaAdmin.html'">Alertas/Notificações</li>

        <li><strong>Clientes ▼</strong></li>
        <li class="submenu" type="button" onclick="window.location.href='AdmGeral.html'" >Adm Geral</li>
        <li class="submenu" type="button" onclick="window.location.href='Marketing.html'" >Marketing</li>
        <li class="submenu active">Suporte</li>
</ul>
</div>

<!-- CONTEÚDO -->
<div class="main">
<div class="header">Suporte & Configurações</div>

<div class="tabs">
<button class="active">Geral</button>
</div>

<div class="container">

<div class="box">
<h3>Idioma</h3>
<label>Idioma</label>
<select>
<option>Português (Brasil)</option>
<option>English</option>
</select>

<label>
<input type="checkbox" checked> Múltiplos idiomas
</label>
</div>

<div class="box">
<h3>Região</h3>
<label>Fuso horário</label>
<select>
<option>GMT-3</option>
<option>GMT-2</option>
</select>

<label>Formato de data</label>
<select>
<option>DD/MM/AAAA</option>
<option>MM/DD/AAAA</option>
</select>
</div>

<div class="box">
<h3>Notificações</h3>
<div class="checkbox-group">
<label><input type="checkbox" checked> E-mail</label>
<label><input type="checkbox" checked> SMS</label>
<label><input type="checkbox" checked> Notificação no sistema</label>
</div>
</div>

</div>

<button class="btn-salvar">Salvar Alterações</button>

</div>

</body>
</html>
