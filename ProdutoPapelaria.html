<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Produto</title>
    <link rel="stylesheet" href="ProdutoPapelaria.css">
</head>
<body>

    <h2 class="titulo">Produto de Papelaria</h2>

    <div class="container">

        <!-- Lado esquerdo (imagens) -->
        <div class="imagens">
            <div class="img-box">
                <img src="img/Post-it programa.jpg" alt="Produto">
                <button class="btn-img">Trocar</button>
            </div>
            <div class="img-box">
                <img src="img/Post-it programa.jpg" alt="Produto">
                <button class="btn-img">Trocar</button>
            </div>
            <div class="img-box">
                <img src="img/Post-it programa.jpg" alt="Produto" >
                <button class="btn-img">Trocar</button>
            </div>
        </div>

        <!-- Lado direito (formulário) -->
        <form class="formulario">

            <div class="linha">
                <div>
                    <label>Nome do Produto</label>
                    <input type="text">
                </div>

                <div>
                    <label>Quantidade em Estoque</label>
                    <input type="number">
                </div>
            </div>

           

            <div class="linha">
                <div>
                    <label>Marca</label>
                    <input type="text">
        
                </div>
                <div>
                    <label>Valor (R$)</label>
                    <input type="number">
                </div>

                
            </div>
            <div class="linha">
                <div>
                    <label>Dimensões</label>
                    <input type="text">
                </div>
                <div>
                    <label>Parcelamento (vezes)</label>
                    <input type="number">
                </div>

                
            </div>

            <label>Descrição</label>
            <textarea rows="5"></textarea>

            <button class="btn">Salvar Produto</button>

        </form>

    </div>

</body>
</html>
